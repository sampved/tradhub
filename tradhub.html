<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradHub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#07080D;--bg2:#0D1018;--bg3:#111520;--bg4:#161A2A;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --amber:#0E7490;--amber2:#38BDF8;--adim:rgba(14,116,144,0.15);--aglow:rgba(14,116,144,0.28);
  --teal:#10B981;--teal2:#34D399;--tdim:rgba(16,185,129,0.15);--tglow:rgba(16,185,129,0.35);
  --coral:#F43F5E;--coral2:#FB7185;--cdim:rgba(244,63,94,0.15);
  --blue:#3B82F6;--blue2:#60A5FA;--bdim:rgba(59,130,246,0.15);
  --violet:#8B5CF6;--violet2:#A78BFA;--vdim:rgba(139,92,246,0.15);
  --t1:#F1F5F9;--t2:#38BDF8;--t3:#0E7490;
  --fn:'Outfit',sans-serif;--fd:'Playfair Display',serif;
  --ease:cubic-bezier(0.4,0,0.2,1);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fn);background:var(--bg);color:var(--t1);font-size:14px}
button,input,select,textarea{font-family:var(--fn)}
button{cursor:pointer;transition:all 0.18s var(--ease)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
#bgc{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ── */
.hdr{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;
  background:rgba(7,8,13,0.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);
  position:relative;z-index:100;flex-shrink:0}
.logo{display:flex;align-items:center;gap:11px}
.lmark{width:44px;height:44px;border-radius:11px;background:#0F2D3D;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px}
.lbar1{width:26px;height:5px;border-radius:2.5px;background:#ECFEFF}
.lbar2{width:26px;height:5px;border-radius:2.5px;background:#38BDF8}
.lbar3{width:26px;height:5px;border-radius:2.5px;background:#0E7490}
.ltxt{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-0.5px}
.lai{display:inline-flex;align-items:center;justify-content:center;background:#0E7490;
  color:#F5F0EB;font-size:9px;font-weight:700;letter-spacing:1px;
  border-radius:8px;padding:2px 7px;margin-left:5px;vertical-align:middle}
.rsw{}
.rbtn{padding:6px 16px;border-radius:999px;font-size:12px;font-weight:600;border:none;
  background:transparent;color:var(--t2);letter-spacing:0.03em}
.rbtn.on{background:#0E7490;color:#F5F0EB;box-shadow:0 0 14px rgba(14,116,144,0.35)}
.rbtn:hover:not(.on){color:var(--t1);background:rgba(255,255,255,0.07)}
.hdrr{display:flex;align-items:center;gap:8px}
.ibtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);
  background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);font-size:15px;position:relative}
.ibtn:hover{border-color:var(--border2);background:rgba(255,255,255,0.08);color:var(--t1)}
.npip{position:absolute;top:7px;right:7px;width:6px;height:6px;background:var(--coral);
  border-radius:50%;border:1.5px solid var(--bg);animation:pip 2s infinite}
@keyframes pip{0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,0.6)}50%{box-shadow:0 0 0 4px rgba(244,63,94,0)}}
.avhdr{width:36px;height:36px;border-radius:9px;background:rgba(14,116,144,0.15);
  border:1px solid rgba(14,116,144,0.3);color:var(--amber);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center}

/* ── MAIN ── */
.mn{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
.sb{width:205px;flex-shrink:0;overflow-y:auto;background:rgba(9,11,19,0.75);
  backdrop-filter:blur(20px);border-right:1px solid var(--border);padding:12px 8px}
.nl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.1em;
  text-transform:uppercase;padding:12px 10px 4px}
.ni{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;
  cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);
  border:none;background:transparent;width:100%;text-align:left;position:relative;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,0.05);color:var(--t1)}
.ni.on{background:rgba(14,116,144,0.13);color:var(--amber);border:1px solid rgba(14,116,144,0.20)}
.ni.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:55%;background:var(--amber);border-radius:0 3px 3px 0;box-shadow:0 0 7px var(--aglow)}
.nico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nbdg{margin-left:auto;background:var(--amber);color:#ECFEFF;font-size:10px;
  font-weight:800;padding:1px 6px;border-radius:999px}

/* ── PAGE ── */
.pg{flex:1;overflow-y:auto;padding:26px;min-height:0}
.pgmap{padding:0;overflow:hidden}

/* ── CARDS ── */
.card{background:rgba(20,24,38,0.9);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:16px;padding:20px}
.card:hover{border-color:var(--border2)}
.card+.card{margin-top:12px}

/* ── METRICS ── */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:22px}
.mc{background:rgba(255,255,255,0.025);border:1px solid var(--border);
  border-radius:13px;padding:16px;position:relative;overflow:hidden}
.mc:hover{border-color:var(--border2)}
.mc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.ma::after{background:linear-gradient(90deg,transparent,var(--amber),transparent)}
.mt::after{background:linear-gradient(90deg,transparent,var(--teal),transparent)}
.mb::after{background:linear-gradient(90deg,transparent,var(--blue),transparent)}
.mv::after{background:linear-gradient(90deg,transparent,var(--violet),transparent)}
.mico{font-size:20px;margin-bottom:8px;display:block}
.mval{font-size:26px;font-weight:800;color:var(--t1);line-height:1}
.mlbl{font-size:11px;color:var(--t2);margin-top:3px;font-weight:500}
.msub{font-size:11px;margin-top:3px;font-weight:600}
.sup{color:var(--teal)}.sdn{color:var(--coral)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;
  font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);
  background:rgba(255,255,255,0.05);color:var(--t1);letter-spacing:0.02em}
.btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.18)}
.btn:active{transform:scale(0.97)}
.btp{background:#0E7490;color:#ECFEFF;border:none}
.btp:hover{box-shadow:0 0 16px rgba(14,116,144,0.45);background:#0C647E}
.bts{background:linear-gradient(135deg,#10B981,#059669);color:#000;border:none}
.bts:hover{box-shadow:0 0 16px rgba(16,185,129,0.4)}
.btd{background:linear-gradient(135deg,#F43F5E,#E11D48);color:white;border:none}
.btg{background:transparent;border:1px solid var(--border2);color:var(--t2)}
.btg:hover{color:var(--t1)}
.bsm{padding:5px 12px;font-size:12px}
.bxs{padding:3px 9px;font-size:11px}
.bful{width:100%;justify-content:center}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;
  border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.03em}
.ba{background:var(--adim);color:var(--amber2);border:1px solid rgba(14,116,144,0.2)}
.bt{background:var(--tdim);color:var(--teal2);border:1px solid rgba(16,185,129,0.2)}
.bc{background:var(--cdim);color:var(--coral2);border:1px solid rgba(244,63,94,0.2)}
.bb{background:var(--bdim);color:var(--blue2);border:1px solid rgba(59,130,246,0.2)}
.bgr{background:rgba(255,255,255,0.05);color:var(--t2);border:1px solid var(--border)}

/* ── FORMS ── */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;
  letter-spacing:0.06em;text-transform:uppercase}
.fc_{width:100%;padding:9px 13px;border:1px solid var(--border2);border-radius:9px;
  font-size:14px;color:var(--t1);background:rgba(255,255,255,0.04);outline:none;
  transition:border-color 0.18s,box-shadow 0.18s}
.fc_::placeholder{color:var(--t3)}
.fc_:focus{border-color:rgba(14,116,144,0.6);background:rgba(14,116,144,0.04);box-shadow:0 0 0 3px rgba(14,116,144,0.12)}
textarea.fc_{resize:vertical;min-height:80px;line-height:1.6}
select.fc_ option{background:#111520;color:var(--t1)}

/* ── PAGE TITLE ── */
.ptit{font-family:var(--fd);font-size:24px;font-weight:700;color:var(--t1);line-height:1.2;margin-bottom:5px}
.psub{font-size:13px;color:var(--t2);margin-bottom:22px}
.sh{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.1em;
  text-transform:uppercase;margin-bottom:10px;margin-top:20px}
.sh:first-child{margin-top:0}

/* ── JOB CARDS ── */
.jc{background:rgba(255,255,255,0.025);border:1px solid var(--border);
  border-radius:14px;padding:16px;margin-bottom:9px;cursor:pointer;
  position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.2s}
.jc::before{content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(14,116,144,0.06),transparent);
  transition:opacity 0.25s;border-radius:inherit;pointer-events:none}
.jc:hover{border-color:rgba(14,116,144,0.35);transform:translateY(-1px)}
.jc:hover::before{opacity:1}
.jc.sel{border-color:rgba(14,116,144,0.5);background:rgba(14,116,144,0.06)}
.jc.urg{border-left:3px solid var(--coral)}

/* ── TRADE ICON ── */
.ti{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;font-size:21px;flex-shrink:0;border:1px solid rgba(255,255,255,0.1)}

/* ── TRADE PICKER ── */
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:18px}
.ttile{border:1px solid var(--border);border-radius:12px;padding:14px 8px;
  text-align:center;cursor:pointer;background:rgba(255,255,255,0.025);transition:all 0.18s}
.ttile:hover{border-color:rgba(14,116,144,0.4);background:var(--adim);transform:translateY(-2px)}
.ttile.on{border-color:var(--amber);background:var(--adim);box-shadow:0 0 14px var(--adim)}
.tico{font-size:26px;margin-bottom:5px;display:block}
.tnm{font-size:11px;font-weight:600;color:var(--t2)}
.ttile.on .tnm{color:var(--amber)}

/* ── AVATAR ── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;flex-shrink:0;border:1px solid rgba(255,255,255,0.1)}
.avs{width:30px;height:30px;font-size:11px}
.avm{width:40px;height:40px;font-size:14px}
.avl{width:52px;height:52px;font-size:18px;border-radius:11px}

/* ── TIMELINE ── */
.tl{padding-left:20px;position:relative}
.tl::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:1px;background:var(--border)}
.tli{position:relative;padding-bottom:16px}
.tli:last-child{padding-bottom:0}
.tld{position:absolute;left:-17px;top:5px;width:12px;height:12px;border-radius:50%;border:2px solid}
.tdon{border-color:var(--teal);background:var(--teal);box-shadow:0 0 7px var(--tglow)}
.tact{border-color:#0E7490;background:#0E7490;box-shadow:0 0 9px var(--aglow);animation:pact 1.5s infinite}
@keyframes pact{0%,100%{box-shadow:0 0 0 0 var(--aglow)}50%{box-shadow:0 0 0 5px rgba(14,116,144,0)}}
.tpnd{border-color:var(--border2);background:var(--bg3)}

/* ── BID CARDS ── */
.bcard{border:1px solid var(--border);border-radius:14px;padding:16px;
  margin-bottom:10px;background:rgba(255,255,255,0.02);transition:border-color 0.18s}
.bcard:hover{border-color:var(--border2)}
.bcard.rec{border-color:rgba(16,185,129,0.4);background:rgba(16,185,129,0.04)}
.bcard.acc{border-color:rgba(14,116,144,0.5);background:var(--adim)}

/* ── MESSAGES ── */
.mlist{display:flex;flex-direction:column;gap:9px;padding:16px;max-height:310px;overflow-y:auto}
.mbub{max-width:72%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5}
.mout{background:#0E7490;color:#ECFEFF;font-weight:500;
  align-self:flex-end;border-bottom-right-radius:4px}
.min{background:rgba(255,255,255,0.07);color:var(--t1);align-self:flex-start;
  border-bottom-left-radius:4px;border:1px solid var(--border)}

/* ── PROGRESS ── */
.pbar{height:4px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#0E7490,#38BDF8);
  border-radius:4px;transition:width 0.5s}

/* ── WIZARD ── */
.wzsteps{display:flex;align-items:flex-start;margin-bottom:26px}
.wzline{flex:1;height:2px;margin:0 7px;transition:background 0.4s}
.done-line{background:var(--teal)}
.pend-line{background:var(--border)}
.wzcirc{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all 0.3s}
.wcpnd{border:2px solid var(--border2);background:transparent;color:var(--t3)}
.wcact{border:2px solid var(--amber);background:var(--adim);color:var(--amber);box-shadow:0 0 10px var(--aglow)}
.wcdn{border:none;background:var(--teal);color:#000;box-shadow:0 0 9px var(--tglow)}
.wzlbl{font-size:10px;font-weight:600;color:var(--t3);margin-top:4px;text-align:center;
  letter-spacing:0.06em;text-transform:uppercase}
.wzlbl.a{color:var(--amber)}.wzlbl.d{color:var(--teal)}

/* ── MAP ── */
.maptop{background:rgba(7,8,13,0.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:11px 18px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.mapsb{width:290px;flex-shrink:0;overflow-y:auto;
  background:rgba(7,8,13,0.9);backdrop-filter:blur(16px);border-right:1px solid var(--border)}
.mapsvgwrap{flex:1;position:relative}
.mapsvgwrap svg{width:100%;height:100%;display:block}
#leaflet-map{width:100%;height:100%;position:absolute;inset:0}
.mapleg{position:absolute;top:11px;right:11px;background:rgba(7,8,13,0.92);
  border:1px solid var(--border);border-radius:13px;padding:11px 13px;
  backdrop-filter:blur(10px);pointer-events:none}

/* ── TOASTS ── */
.tswrap{position:fixed;bottom:22px;right:22px;z-index:9999;
  display:flex;flex-direction:column;gap:7px;pointer-events:none}
.ts{background:rgba(20,23,38,0.97);backdrop-filter:blur(20px);
  border:1px solid var(--border2);color:var(--t1);padding:12px 16px;
  border-radius:13px;font-size:13px;font-weight:500;
  animation:tsin 0.3s cubic-bezier(0.34,1.56,0.64,1);max-width:290px;
  display:flex;align-items:center;gap:9px}
.ts.ok{border-color:rgba(16,185,129,0.4);color:var(--teal2)}
.ts.wn{border-color:rgba(14,116,144,0.4);color:#38BDF8}
.ts.er{border-color:rgba(244,63,94,0.4);color:var(--coral2)}
@keyframes tsin{from{transform:translateX(40px) scale(0.9);opacity:0}to{transform:none;opacity:1}}

/* ── MODAL ── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.mbg.op{display:flex}
.mdl{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:24px;
  width:100%;max-width:450px;box-shadow:0 40px 80px rgba(0,0,0,0.6);
  animation:mdin 0.25s cubic-bezier(0.34,1.2,0.64,1);max-height:85vh;overflow-y:auto}
@keyframes mdin{from{transform:scale(0.92) translateY(10px);opacity:0}to{transform:none;opacity:1}}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mtit{font-size:17px;font-weight:700}
.mcls{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);
  background:rgba(255,255,255,0.05);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:13px;color:var(--t2)}
.mcls:hover{color:var(--t1)}

/* ── NOTIF ROWS ── */
.nrow{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer}
.nrow:hover{background:rgba(255,255,255,0.03)}
.nrow.unrd{background:rgba(14,116,144,0.07)}
.nico2{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;font-size:16px}

/* ── STARS ── */
.son{color:#38BDF8;font-size:14px;cursor:pointer}
.soff{color:rgba(255,255,255,0.1);font-size:14px;cursor:pointer}

/* ── SEARCH ── */
.sbar{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:9px;padding:8px 13px;margin-bottom:16px}
.sbar:focus-within{border-color:rgba(14,116,144,0.5);background:rgba(14,116,144,0.05)}
.sbar input{border:none;outline:none;font-size:14px;font-family:var(--fn);
  color:var(--t1);background:transparent;flex:1}
.sbar input::placeholder{color:var(--t3)}

/* ── EMPTY ── */
.emp{text-align:center;padding:48px 24px}
.eico{font-size:40px;margin-bottom:12px;display:block;opacity:0.5}
.etit{font-size:16px;font-weight:700;color:var(--t2);margin-bottom:5px}
.etxt{font-size:13px;color:var(--t3)}

/* ── UTILS ── */
.frow{display:flex;align-items:center}
.fjb{display:flex;align-items:center;justify-content:space-between}
.fwrap{flex-wrap:wrap}
.g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g12{gap:12px}.g16{gap:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.t2{color:var(--t2)}.t3{color:var(--t3)}
.ta{color:var(--amber)}.tt{color:var(--teal)}.tc{color:var(--coral)}
.f5{font-weight:500}.f6{font-weight:600}.f7{font-weight:700}.f8{font-weight:800}
.tright{text-align:right}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.wf{width:100%}
.dv{height:1px;background:var(--border);margin:13px 0}
.ptag{font-size:15px;font-weight:800;color:var(--amber);font-variant-numeric:tabular-nums}
.fade{animation:fu 0.25s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(max-width:720px){.sb{display:none}.mgrid{grid-template-columns:1fr 1fr}.tgrid{grid-template-columns:repeat(3,1fr)}}
/* ── AUTH SCREEN ── */
#auth-screen{position:fixed;inset:0;z-index:500;display:flex;align-items:stretch;overflow:hidden}
.auth-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;

<script>
/* PARTICLE BACKGROUND */
(()=>{
  const c=document.getElementById('bgc'),x=c.getContext('2d');
  let W,H,P=[];
  const rs=()=>{W=c.width=innerWidth;H=c.height=innerHeight};rs();
  addEventListener('resize',rs);
  for(let i=0;i<55;i++)P.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.2+.3,a:Math.random()*6.28});
  const draw=()=>{
    x.clearRect(0,0,W,H);x.fillStyle='#07080D';x.fillRect(0,0,W,H);
    [[.2,.3,.38,'13,148,136',.022],[.8,.7,.35,'94,234,212',.016],[.5,.05,.28,'4,47,46',.018]].forEach(([ax,ay,r,col,a])=>{
      const g=x.createRadialGradient(W*ax,H*ay,0,W*ax,H*ay,W*r);
      g.addColorStop(0,`rgba(${col},${a})`);g.addColorStop(1,'transparent');
      x.fillStyle=g;x.fillRect(0,0,W,H);
    });
    P.forEach(p=>{
      p.x+=p.vx/W*80;p.y+=p.vy/H*80;
      if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;
      x.beginPath();x.arc(p.x*W,p.y*H,p.r,0,6.28);
      x.fillStyle=`rgba(14,116,144,${.18+Math.sin(p.a+=.006)*.08})`;x.fill();
    });
    for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){
      const dx=(P[i].x-P[j].x)*W,dy=(P[i].y-P[j].y)*H,d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){x.beginPath();x.moveTo(P[i].x*W,P[i].y*H);x.lineTo(P[j].x*W,P[j].y*H);
        x.strokeStyle=`rgba(56,189,248,${.04*(1-d/100)})`;x.lineWidth=.5;x.stroke();}
    }
    requestAnimationFrame(draw);
  };draw();
})();

/* ─────────────────────────────────────
   API LAYER
─────────────────────────────────────── */
// API URL — update RENDER_URL to your actual Render service URL
const IS_LOCAL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
const RENDER_URL = 'https://herfeh-server.onrender.com/api'; // ← your Render URL
const API = IS_LOCAL ? 'http://localhost:4000/api' : RENDER_URL;

// ── Google OAuth — replace with your Client ID from console.cloud.google.com ──
const GOOGLE_CLIENT_ID = '800240524044-19h1tkk4ecabopunishf0rc66q5p61o6.apps.googleusercontent.com';

// ── Google Maps API Key — replace for address autocomplete ──
const GMAPS_KEY = 'YOUR_GOOGLE_MAPS_API_KEY';
let _token = localStorage.getItem('hf_token') || null;

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json', ...(_token?{Authorization:'Bearer '+_token}:{})} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    // For GET requests, silently return empty data on 404 (data just doesn't exist yet)
    // For POST/PATCH/DELETE, always throw so the caller knows something went wrong
    if (res.status === 404 && method === 'GET') return Array.isArray(data) ? [] : {};
    throw Object.assign(new Error(data.error || 'Request failed'), {status: res.status, data});
  }
  return data;
}

let _ws = null;
function connectWS() {
  if (!_token || _ws) return;
  const WS_URL = IS_LOCAL
    ? 'ws://localhost:4000/ws?token=' + _token
    : 'wss://herfeh-server.onrender.com/ws?token=' + _token;
  _ws = new WebSocket(WS_URL);
  _ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if(msg.type==='location_update'&&S.role==='homeowner'){
        const inProgJob=S.jobs.find(j=>j.st==='in_progress'&&j.own===(S.user?.id||''));
        handleTradesmanLocation(msg.lat,msg.lng,inProgJob?.id);return;
      }
      if (msg.type === 'notification') {
        S.notifs.unshift(msg.notification);
        const pip = document.getElementById('npip');
        if (pip) pip.style.display = 'block';
        toast(msg.notification.title);
        rPg();
      } else if (msg.type === 'message') {
        const key = msg.message.job_id + '::' + msg.message.sender_id;
        if (!S.msgs[key]) S.msgs[key] = [];
        S.msgs[key].push(msg.message);
        if (S.page === 'messages-home') rPg();
        else toast('New message: ' + msg.message.text.substring(0, 40));
      }
    } catch {}
  };
  _ws.onclose = () => { _ws = null; setTimeout(connectWS, 3000); };
  _ws.onerror = () => { _ws = null; };
}

/* STATE — UI only; data loaded from API */
const S = {
  role: 'homeowner', page: 'post-job', step: 1,
  draft: {tr:'',ti:'',de:'',ur:'within48',b0:100,b1:300,ad:'',ci:'',zp:''},
  tf:'all', sq:'', bv:'map', jv:null, bjid:null, ck:null, sortBy:'recent',
  jobs:[], bids:{}, cons:{}, msgs:{}, notifs:[], revs:[], myBids:[],
  user:null, profile:null,
};

/* Data loaders */
async function loadJobs() {
  try {
    if (S.role === 'homeowner') {
      const jobs = await api('GET', '/jobs/mine');
      S.jobs = jobs.map(normalizeJob);
      jobs.forEach(j => (j.bids||[]).forEach(b => { S.bids[b.id] = normalizeBid(b); }));
    } else {
      const p = new URLSearchParams({trade: S.tf});
      if (USER_LOC.lat) { p.set('lat', USER_LOC.lat); p.set('lng', USER_LOC.lng); p.set('radius', '50'); }
      const jobs = await api('GET', '/jobs?' + p);
      S.jobs = jobs.map(normalizeJob);
      jobs.forEach(j => (j.bids||[]).forEach(b => { S.bids[b.id] = normalizeBid(b); }));
    }
  } catch(e) { if(e.status!==404) throw e; }
}
async function loadMyBids() {
  try {
    const bids = await api('GET', '/bids/mine');
    S.myBids = bids.map(b => b.id);
    bids.forEach(b => { S.bids[b.id] = normalizeBid(b); });
  } catch(e) { if(e.status!==404) throw e; S.myBids=[]; }
}
async function loadNotifications() {
  try {
    const notifs = await api('GET', '/notifications');
    S.notifs = notifs.map(n => ({...n, ty:n.type, ti:n.title, bo:n.body, t:n.created_at, rd:!!n.read, lk:n.link}));
  } catch(e) { if(e.status!==404) throw e; S.notifs=[]; }
}
async function loadReviews() {
  if (!S.user) return;
  const revs = await api('GET', '/reviews/user/' + S.user.id);
  S.revs = revs.map(r => ({...r, rt:r.rating, tx:r.text, t:r.created_at}));
}

/* Shape normalizers */
function normalizeJob(j) {
  return {
    id:j.id, own:j.owner_id, tr:j.trade, ti:j.title, de:j.description,
    ur:j.urgency, b0:j.budget_min, b1:j.budget_max,
    ad:j.address, ci:j.city||'', zp:j.zip||'',
    lat:j.lat, lng:j.lng, st:j.status, at:j.created_at, dn:j.completed_at,
    ac:j.accepted_bid_id, bids:(j.bids||[]).map(b=>b.id||b),
    bid_count:j.bid_count||(j.bids||[]).length,
    distance_miles:j.distance_miles,
  };
}
function normalizeBid(b) {
  return {
    id:b.id, ji:b.job_id, ci:b.bidder_id,
    pr:b.price, ty:b.bid_type||'flat', av:b.availability||'today',
    ms:b.message||'', st:b.status, at:b.created_at,
    bidder_name:b.bidder_name, bidder_ini:b.bidder_ini,
    license:b.license, insured:b.insured, bonded:b.bonded,
    rat:b.avg_rating||0, rv:b.review_count||0, bio:b.bio||'',
    job_title:b.job_title, trade:b.trade, job_status:b.job_status,
    budget_min:b.budget_min, budget_max:b.budget_max, owner_id:b.owner_id,
  };
}
function conFromBid(bid) {
  const t = gt(bid.trade||'');
  return {id:bid.ci, nm:bid.bidder_name||'Contractor', ini:bid.bidder_ini||'?',
    bg:t.bg, fg:t.mc, rat:bid.rat||0, rv:bid.rv||0, li:!!bid.license, ins:!!bid.insured, bi:bid.bio||''};
}

const TRADES=[
  {id:'electrical',   lb:'Electrical',         ic:'⚡', bg:'rgba(234,179,8,.2)',   mc:'#EAB308'},
  {id:'plumbing',     lb:'Plumbing',            ic:'🔧', bg:'rgba(59,130,246,.2)',  mc:'#3B82F6'},
  {id:'painting',     lb:'Painting',            ic:'🎨', bg:'rgba(139,92,246,.2)',  mc:'#8B5CF6'},
  {id:'drywall',      lb:'Drywall',             ic:'🧱', bg:'rgba(161,140,100,.2)', mc:'#A18C64'},
  {id:'hvac',         lb:'HVAC',                ic:'❄️', bg:'rgba(14,116,144,.2)',  mc:'#0E7490'},
  {id:'framing',      lb:'Framing',             ic:'🪵', bg:'rgba(180,83,9,.2)',    mc:'#B45309'},
  {id:'foundation',   lb:'Foundation',          ic:'🏗️', bg:'rgba(100,116,139,.2)', mc:'#64748B'},
  {id:'roofing',      lb:'Roofing',             ic:'🏠', bg:'rgba(244,63,94,.2)',   mc:'#F43F5E'},
  {id:'cabinets',     lb:'Cabinets',            ic:'🗄️', bg:'rgba(16,185,129,.2)',  mc:'#10B981'},
  {id:'furniture',    lb:'Furniture Assembly',  ic:'🛋️', bg:'rgba(99,102,241,.2)',  mc:'#6366F1'},
  {id:'other',        lb:'Other',               ic:'🔩', bg:'rgba(107,114,128,.2)', mc:'#6B7280'},
];
const UL={within48:'Within 48 hrs',thisweek:'This week',thismonth:'This month',flexible:'Flexible'};
const AL={today:'Today',tomorrow:'Tomorrow',thisweek:'This week',flexible:'Flexible'};
// Dynamic job coordinates — populated by geocoding
const JXY={};

// User's real location
let USER_LOC={lat:null,lng:null};

// Geocoding cache
const _geoCache={};

// Geocode an address via Nominatim (free, no API key needed)
async function geocodeAddr(addr){
  if(_geoCache[addr])return _geoCache[addr];
  try{
    const q=encodeURIComponent(addr);
    const r=await fetch('https://nominatim.openstreetmap.org/search?q='+q+'&format=json&limit=1',
      {headers:{'Accept-Language':'en','User-Agent':'TradHub/1.0'}});
    const d=await r.json();
    if(d&&d[0]){
      const c={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
      _geoCache[addr]=c;
      return c;
    }
  }catch(e){}
  return null;
}

// Small random offset so pins don't stack on same address
function jitter(c,m=0.0008){
  return{lat:c.lat+(Math.random()-.5)*m,lng:c.lng+(Math.random()-.5)*m};
}

// Geocode all jobs and populate JXY
async function geocodeAllJobs(){
  const jobs=S.jobs.filter(j=>j.ad&&j.ci);
  await Promise.all(jobs.map(async j=>{
    if(JXY[j.id])return;
    const full=j.ad+', '+j.ci;
    const c=await geocodeAddr(full);
    if(c)JXY[j.id]=jitter(c);
  }));
}

// Get real user GPS location, fall back to IP geolocation
async function getUserLocation(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){resolve(null);return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{USER_LOC={lat:pos.coords.latitude,lng:pos.coords.longitude};resolve(USER_LOC);},
      async ()=>{
        try{
          const r=await fetch('https://ipapi.co/json/');
          const d=await r.json();
          if(d.latitude){USER_LOC={lat:d.latitude,lng:d.longitude};resolve(USER_LOC);return;}
        }catch(e){}
        resolve(null);
      },
      {timeout:6000,maximumAge:300000}
    );
  });
}

const gt=id=>TRADES.find(t=>t.id===id)||{lb:id,ic:'🔧',bg:'rgba(255,255,255,.1)',mc:'#888'};
const ago=ts=>{const d=Date.now()-ts,m=~~(d/6e4),h=~~(d/36e5),dy=~~(d/864e5);return d<6e4?'just now':d<36e5?m+'m ago':d<864e5?h+'h ago':dy+'d ago'};
const fdt=ts=>new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
const fc=n=>'$'+Math.round(n).toLocaleString();
const uid=p=>p+(Date.now()%1e6)+~~(Math.random()*999);
const unrd=()=>S.notifs.filter(n=>!n.rd).length;
const haversine=(lat1,lng1,lat2,lng2)=>{
  const R=3958.8,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};
const jobDist=id=>{
  if(!USER_LOC.lat||!JXY[id])return null;
  return haversine(USER_LOC.lat,USER_LOC.lng,JXY[id].lat,JXY[id].lng);
};
const fmtDist=id=>{const d=jobDist(id);return d!==null?d<0.1?'<0.1 mi':d.toFixed(1)+' mi':''};

function jst(j){

  return'<span class="bdg bgr">Draft</span>';
}

function toast(msg,t='ok'){
  const w=document.getElementById('tsw'),ico={ok:'✅',wn:'⚠️',er:'❌'};
  const el=document.createElement('div');el.className=`ts ${t}`;
  el.innerHTML=`<span>${ico[t]||'✅'}</span><span>${msg}</span>`;w.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .4s,transform .4s';el.style.opacity='0';el.style.transform='translateX(20px)';setTimeout(()=>el.remove(),400)},3000);
}

async function subJob() {
  try {
    const job = await api('POST', '/jobs', {
      trade:S.draft.tr, title:S.draft.ti, description:S.draft.de,
      urgency:S.draft.ur, budgetMin:S.draft.b0, budgetMax:S.draft.b1,
      address:S.draft.ad, city:S.draft.ci, zip:S.draft.zp,
    });
    const n = normalizeJob(job);
    S.jobs.unshift(n);
    if (S.draft.ad) {
      geocodeAddr(S.draft.ad + (S.draft.ci?', '+S.draft.ci:'')).then(c => {
        if (c) { JXY[n.id] = jitter(c, 0.0004);
          api('PATCH', '/jobs/'+n.id+'/coords', {lat:c.lat, lng:c.lng}).catch(()=>{}); }
      });
    }
    S.draft = {tr:'',ti:'',de:'',ur:'within48',b0:100,b1:300,ad:'',ci:'',zp:'',photos:[],aiEst:null};
    S.step = 1;
    toast('Job posted! Bids will arrive soon 🎉'); go('review-bids');
  } catch(err) { toast(err.message || 'Failed to post job', 'er'); }
}

  if(S.role==='tradesman'){const ipj=mj.filter(j=>j.st==='in_progress');if(ipj.length&&!window._trackingActive)startTrackingBroadcast();}
  if(!S.bjid)S.bjid=mj[0].id;
  const job=S.jobs.find(j=>j.id===S.bjid)||mj[0];S.bjid=job.id;
  const t=gt(job.tr);
  let tabs='<div class="frow g8 mb20 fwrap">';
  mj.forEach(j=>tabs+=`<button class="btn bsm${S.bjid===j.id?' btp':' btg'}" onclick="S.bjid='${j.id}';rPg()">${gt(j.tr).ic} ${j.ti.substring(0,22)}${j.ti.length>22?'…':''}</button>`);
  tabs+='</div>';

  // Tracking: inject track panel for in_progress jobs

  (async()=>{
    await new Promise(r=>setTimeout(r,100));
    const el=document.getElementById(miniMapId);

    // Geocode if not cached
    if(!JXY[job.id]&&job.ad&&job.ci){

    m.setView([coord.lat,coord.lng],15);

    L.marker([coord.lat,coord.lng],{icon:pinIcon}).addTo(m).bindPopup(`<b>${job.ti}</b><br>${job.ad}`);

    if(USER_LOC.lat){

          <div class="tright"><div class="ptag">${fc(b.pr)}</div><div class="t2" style="font-size:11px;margin-top:3px">${b.ty==='flat'?'flat rate':'+ parts'}</div></div>

async function confirmPayment(jobId, bidId) {
  const card = document.getElementById('pay-card')?.value.replace(/\s/g,'');
  const exp  = document.getElementById('pay-exp')?.value;
  const cvc  = document.getElementById('pay-cvc')?.value;
  const errEl= document.getElementById('pay-err');
  if (!card || card.length < 15) { errEl.textContent='Enter a valid card number'; errEl.style.display='block'; return; }
  if (!exp  || exp.length < 5)   { errEl.textContent='Enter expiry (MM/YY)';      errEl.style.display='block'; return; }
  if (!cvc  || cvc.length < 3)   { errEl.textContent='Enter CVC';                 errEl.style.display='block'; return; }

  const btn = document.querySelector('#pay-card-area')?.nextElementSibling?.nextElementSibling;
  const payBtn = document.querySelector('.mhdr')?.closest('.mbg')?.querySelector('.btn.btp.bful');
  if (payBtn) { payBtn.disabled=true; payBtn.textContent='Processing…'; }

  try {
    // Step 1: Create payment intent
    const intent = await api('POST', '/payments/create-intent', {jobId, bidId});

    // Step 2: Confirm (in production this is where Stripe.js collects real card data)
    const result = await api('POST', '/payments/confirm', {paymentId: intent.paymentId});

    // Update local state
    const job = S.jobs.find(j=>j.id===jobId);
    const bid = S.bids[bidId];
    if (job) { job.st='inprogress'; job.ac=bidId; job.payment_id=intent.paymentId; }
    if (bid) { bid.st='accepted'; }
    Object.values(S.bids).filter(x=>x.ji===jobId&&x.id!==bidId).forEach(x=>x.st='rejected');

    cMdl();
    toast('Payment secured! Work begins soon 🎉');
    rPg();
  } catch(err) {
    if (payBtn) { payBtn.disabled=false; payBtn.textContent=`Pay & Confirm Bid →`; }
    const errEl=document.getElementById('pay-err');
    if(errEl){errEl.textContent=err.message||'Payment failed';errEl.style.display='block';}
  }
}

async function openChat(jid, otherId) {
  const key = jid + '::' + otherId;
  S.ck = key;
  if (!S.msgs[key]) {
    try {
      const msgs = await api('GET', '/messages/'+jid+'/'+otherId);
      S.msgs[key] = msgs;

async function sendM() {
  const inp = document.getElementById('chi');
  const tx = inp?.value.trim(); if (!tx) return;
  const [jobId, otherId] = S.ck.split('::');
  if (!S.msgs[S.ck]) S.msgs[S.ck] = [];
  const tmp = {id:'tmp'+Date.now(), sender_id:S.user?.id, text:tx, created_at:Date.now(),
    sender_name:S.user?.name, sender_ini:S.user?.ini};
  S.msgs[S.ck].push(tmp); inp.value=''; rPg();
  try {
    const msg = await api('POST', '/messages', {jobId, receiverId:otherId, text:tx});
    const idx = S.msgs[S.ck].findIndex(m => m.id===tmp.id);
    if (idx>=0) S.msgs[S.ck][idx] = msg;
    rPg();
  } catch(err) {
    toast(err.message || 'Send failed', 'er');
    S.msgs[S.ck] = S.msgs[S.ck].filter(m => m.id!==tmp.id);
    rPg();
  }
}

let _leafMarkers={};

// Render job markers onto an existing Leaflet map instance
function renderJobMarkers(map, filtJobs, userLat, userLng){
  // Clear old markers
  Object.values(_leafMarkers).forEach(m=>m.remove());
  _leafMarkers={};

  const open=S.jobs.filter(j=>j.st==='bidding');
  const bounds=userLat?[[userLat,userLng]]:[];

  open.forEach(job=>{
    const coord=JXY[job.id];
    if(!coord)return;
    bounds.push([coord.lat,coord.lng]);
    const t=gt(job.tr);
    const isFilt=filtJobs.some(fj=>fj.id===job.id);
    const isDim=!isFilt;
    const isUrg=job.ur==='within48';
    const alb=S.myBids.some(bid=>S.bids[bid]&&S.bids[bid].ji===job.id);
    const isSel=S.jv===job.id;
    const badgeDot=alb?`<div style="position:absolute;top:-4px;right:-4px;width:12px;height:12px;border-radius:50%;background:#10B981;border:2px solid #07080D;display:flex;align-items:center;justify-content:center;font-size:7px;color:white">✓</div>`
      :isUrg?`<div style="position:absolute;top:-4px;right:-4px;width:12px;height:12px;border-radius:50%;background:#F43F5E;border:2px solid #07080D;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:700">!</div>`:'';
    const sz=isSel?46:34;
    const op=isDim?0.25:1;
    const ring=isSel?`box-shadow:0 0 0 4px ${t.mc}40,0 3px 12px rgba(0,0,0,.7);`:isUrg&&!alb&&!isDim?`box-shadow:0 0 0 8px ${t.mc}18,0 3px 12px rgba(0,0,0,.6);`:`box-shadow:0 3px 10px rgba(0,0,0,.6);`;
    const markerHtml=`<div style="position:relative;width:${sz}px;height:${sz}px;opacity:${op}">
      <div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${t.mc};border:${isSel?3:2}px solid rgba(255,255,255,${isSel?.95:.65});${ring}display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:${isSel?22:16}px;transition:all .2s">
        ${t.ic}
      </div>
      ${badgeDot}
    </div>`;
    const icon=L.divIcon({className:'',html:markerHtml,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const marker=L.marker([coord.lat,coord.lng],{icon,zIndexOffset:isSel?900:isDim?0:500});
    marker.addTo(map);
    marker.on('click',()=>{selPin(job.id);});
    _leafMarkers[job.id]=marker;
  });

  return bounds;
}

async function initLeafletMap(filtJobs){
  const mapEl=document.getElementById('leaflet-map');
  if(!mapEl)return;

  // Show loading indicator
  mapEl.innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(7,8,13,.7);z-index:999;font-size:13px;color:var(--t2);gap:8px"><span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> Loading map…</div>';

  // Destroy existing map instance
  if(window._leafMap){window._leafMap.remove();window._leafMap=null;_leafMarkers={};}

  // Get user location + geocode job addresses in parallel
  await Promise.all([getUserLocation(), geocodeAllJobs()]);

  // Clear loading overlay
  mapEl.innerHTML='';

  const map=L.map('leaflet-map',{zoomControl:true,attributionControl:false});
  window._leafMap=map;

  // Dark tile layer (CartoDB Dark Matter)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:'abcd',maxZoom:19
  }).addTo(map);

  // User location pin
  const userLat=USER_LOC.lat, userLng=USER_LOC.lng;
  if(userLat){
    const userIcon=L.divIcon({className:'',html:`<div style="width:22px;height:22px;border-radius:50%;background:#0E7490;border:3px solid rgba(7,8,13,.95);box-shadow:0 0 0 6px rgba(14,116,144,.25),0 2px 8px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center"><div style="width:6px;height:6px;border-radius:50%;background:white"></div></div>`,iconSize:[22,22],iconAnchor:[11,11]});
    L.marker([userLat,userLng],{icon:userIcon,zIndexOffset:1000}).addTo(map).bindPopup('<b>Your Location</b>');
  }

  const bounds=renderJobMarkers(map, filtJobs, userLat, userLng);

  // Fit map to all markers
  if(bounds.length>1){
    map.fitBounds(bounds,{padding:[40,40],maxZoom:15});
  } else if(userLat){
    map.setView([userLat,userLng],13);
  } else {
    map.setView([51.505,0],10); // fallback: London center
  }

  // If a job is selected, center on it
  if(S.jv&&JXY[S.jv]){
    map.setView([JXY[S.jv].lat,JXY[S.jv].lng],15,{animate:false});
  }
}

function credentialsMissing(price){
  // Returns an array of missing credential labels for bids >= $500
  if(price < 500) return [];
  const u = S.user;
  const missing = [];
  if(!u?.license || u.license.trim()==='') missing.push({key:'license', label:'License number', icon:'📋'});
  if(!u?.insured)  missing.push({key:'insured',  label:'Proof of insurance', icon:'🛡️'});
  if(!u?.bonded)   missing.push({key:'bonded',   label:'Surety bond',        icon:'🔒'});
  return missing;
}

async function subBid(jobId){
  const p=document.getElementById(`bp-${jobId}`),a=document.getElementById(`ba-${jobId}`),m=document.getElementById(`bm-${jobId}`);
  const price=parseFloat(p?.value);if(!price||price<1){toast('Enter a valid price','er');return}

  // Credential gate for $500+ bids
  const missing = credentialsMissing(price);
  if(missing.length > 0){
    showCredentialBlocker(price, missing, jobId);
    return;
  }

  try {
    const bid = await api('POST', '/bids', {
      jobId, price, availability:a?.value||'today', message:m?.value||''
    });
    const nb = normalizeBid(bid);
    S.bids[nb.id] = nb;
    const j = S.jobs.find(j=>j.id===jobId);
    if (j && !j.bids.includes(nb.id)) j.bids.push(nb.id);
    if (!S.myBids.includes(nb.id)) S.myBids.push(nb.id);
    S.jv=null; toast('Bid submitted! 🎉'); rPg();
  } catch(err) {
    if (err.data?.missing) showCredentialBlocker(price, err.data.missing.map(l=>({label:l,icon:'📋'})), jobId);
    else toast(err.message||'Failed to submit bid','er');
  }
}

function checkBidPrice(val, warnId){
  const el = document.getElementById(warnId);
  if(!el) return;
  const price = parseFloat(val);
  if(!price || price < 500){ el.style.display='none'; return; }
  const missing = credentialsMissing(price);
  if(missing.length === 0){
    el.style.display = 'block';
    el.style.color = '#10B981';
    el.textContent = '✓ Credentials verified for this bid amount';
  } else {
    el.style.display = 'block';
    el.style.color = '#0E7490';
    el.textContent = '⚠ ' + missing.map(m=>m.label).join(', ') + ' required to submit';
  }
}

async function saveProfile() {
  const tContainer = document.getElementById('pr-trades');
  const trades = tContainer
    ? [...tContainer.querySelectorAll('.ttile.on')].map(el=>el.dataset.id).filter(Boolean)
    : [];
  try {
    const result = await api('PATCH', '/auth/profile', {
      name:       document.getElementById('pr-nm')?.value,
      bio:        document.getElementById('pr-bio')?.value,
      license:    document.getElementById('pr-lic')?.value?.trim(),
      experience: document.getElementById('pr-exp')?.value,
      insured:    document.querySelector('input[name="pr-ins"]:checked')?.value==='yes',
      bonded:     document.querySelector('input[name="pr-bnd"]:checked')?.value==='yes',
      trades,
    });
    S.user = result.user; S.profile = result.user.profile||null;
    updateHdrUser(); toast('Profile saved! ✨'); rPg();
  } catch(err) { toast(err.message || 'Save failed', 'er'); }
}

function pwStrength(pw) {
  let s=0;
  if(pw.length>=8)s++; if(/[A-Z]/.test(pw))s++; if(/[0-9]/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw))s++;
  return{score:s,label:['','Weak','Fair','Good','Strong'][s]||'Weak',col:['','#F43F5E','#0E7490','#3B82F6','#10B981'][s]||'#F43F5E'};
}

function doGoogleLogin() {
  if(GOOGLE_CLIENT_ID==='YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com'){
    toast('Add your Google Client ID to the config at the top of this file','er');return;
  }
  if(typeof google==='undefined'){
    toast('Google is still loading — please try again in a second','er');return;
  }
  const role = window._regRole || 'homeowner';
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'email profile openid',
    callback: async (resp) => {
      if(resp.error || !resp.access_token){
        toast('Google sign-in was cancelled or failed','er');return;
      }
      try {
        // Get user info from Google
        const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
          {headers:{Authorization:'Bearer '+resp.access_token}}).then(r=>r.json());

        if(!info.email){
          toast('Could not get your email from Google — please try email login','er');return;
        }

        // Send to server — single endpoint handles both login and auto-register
        const res = await api('POST','/auth/google-login',{
          email: info.email,
          name:  info.name || info.email.split('@')[0],
          googleId: info.sub,
          role,  // homeowner or tradesman — set by which portal they're on
        });

        // Guard against empty response (e.g. server not yet deployed)
        if (!res || !res.token || !res.user) {
          toast('Sign-in failed — server not responding. Please try again in a moment.','er');
          return;
        }
        localStorage.setItem('hf_token', res.token);
        _token = res.token;
        S.user  = res.user;
        S.role  = res.user.role || role;
        toast('Welcome ' + (res.user.name||'').split(' ')[0] + '! 👋');
        finishAuth();
      } catch(err) {
        console.error('Google login error:', err);
        toast(err.message || 'Google sign-in failed — please try again','er');
      }
    }
  });
  client.requestAccessToken();
}

// ADDRESS AUTOCOMPLETE (Nominatim — no API key needed)
// ════════════════════════════════════════════════════════
let _addrTimer=null;
async function addrAutocomplete(inp,sugId){
  const q=inp.value.trim(),sug=document.getElementById(sugId);
  if(!sug)return;
  if(q.length<3){sug.style.display='none';return;}
  clearTimeout(_addrTimer);
  _addrTimer=setTimeout(async()=>{
    try{
      const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1&countrycodes=us`,
        {headers:{'Accept-Language':'en','User-Agent':'TradHub/1.0'}});
      const results=await res.json();
      if(!results.length){sug.style.display='none';return;}
      sug.innerHTML=results.map((r,i)=>{
        const a=r.address;
        const label=[a?.house_number,a?.road,a?.city||a?.town,a?.state].filter(Boolean).join(', ')||r.display_name.split(',').slice(0,3).join(',');
        return`<div class="addr-suggestion" onclick="selectAddr(${i},'${sugId}','${inp.id}')" data-idx="${i}"
          data-hn="${(a?.house_number||'').replace(/"/g,'')}" data-road="${(a?.road||'').replace(/"/g,'')}"
          data-city="${(a?.city||a?.town||a?.village||'').replace(/"/g,'')}" data-zip="${(a?.postcode||'').replace(/"/g,'')}"
          >${label}</div>`;
      }).join('');
      sug.style.display='block';
      document.onclick=e=>{if(!sug.contains(e.target)&&e.target!==inp)sug.style.display='none';};
    }catch(e){sug.style.display='none';}
  },450);
}
function selectAddr(i,sugId,inpId){
  const item=document.getElementById(sugId).querySelectorAll('.addr-suggestion')[i];
  if(!item)return;
  const street=[item.dataset.hn,item.dataset.road].filter(Boolean).join(' ');
  document.getElementById(inpId).value=street||item.textContent.split(',')[0];
  const cityEl=document.getElementById('jci');if(cityEl)cityEl.value=item.dataset.city||'';
  const zipEl=document.getElementById('jz');if(zipEl)zipEl.value=item.dataset.zip||'';
  document.getElementById(sugId).style.display='none';
}

window._trackingActive=false;
window._trackMap=null;
window._tradesmanMarker=null;
window._trackInterval=null;

function startTrackingBroadcast(){
  if(!navigator.geolocation)return;
  window._trackingActive=true;
  const share=()=>navigator.geolocation.getCurrentPosition(pos=>{
    if(_ws&&_ws.readyState===1)
      _ws.send(JSON.stringify({type:'location_update',lat:pos.coords.latitude,lng:pos.coords.longitude}));
  });
  share();
  window._trackInterval=setInterval(share,15000);
}
function stopTrackingBroadcast(){
  window._trackingActive=false;clearInterval(window._trackInterval);}

function injectTrackPanels(){
  const inProg=S.jobs.filter(j=>j.own===(S.user?.id||'')&&j.st==='in_progress');
  inProg.forEach(job=>{
    const el=document.getElementById('track-panel-'+job.id);
    if(!el||el.dataset.rendered)return;
    el.dataset.rendered='1';
    el.innerHTML=`
      <div class="frow g8 mb8"><span class="track-badge">● Tradesman en route</span></div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:8px">Live location — updates every 15 seconds</div>
      <div id="track-map-${job.id}" class="track-map"></div>
      <div id="track-eta-${job.id}" style="font-size:12px;color:var(--t3);margin-top:6px;text-align:center">Waiting for tradesman location…</div>`;
    setTimeout(()=>initTrackMap(job.id),150);
  });
}

function initTrackMap(jobId){
  const el=document.getElementById('track-map-'+jobId);if(!el||window._trackMap)return;
  const jxy=JXY[jobId]||USER_LOC||{lat:34.0195,lng:-118.4912};
  const map=L.map('track-map-'+jobId,{zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
  const homeIco=L.divIcon({className:'',html:`<div style="width:18px;height:18px;border-radius:50%;background:#0E7490;border:3px solid rgba(14,116,144,.4);box-shadow:0 0 0 5px rgba(14,116,144,.12)"></div>`,iconSize:[18,18],iconAnchor:[9,9]});
  L.marker([jxy.lat,jxy.lng],{icon:homeIco}).addTo(map).bindPopup('Job location');
  map.setView([jxy.lat,jxy.lng],14);
  window._trackMap=map;window._trackJobCoords=jxy;
}

function handleTradesmanLocation(lat,lng,jobId){
  if(!window._trackMap){initTrackMap(jobId);}
  if(!window._trackMap)return;
  const trIco=L.divIcon({className:'',html:`<div style="width:22px;height:22px;border-radius:50%;background:#10B981;border:3px solid rgba(16,185,129,.5);display:flex;align-items:center;justify-content:center;font-size:10px">🔧</div>`,iconSize:[22,22],iconAnchor:[11,11]});
  if(window._tradesmanMarker)window._tradesmanMarker.setLatLng([lat,lng]);
  else window._tradesmanMarker=L.marker([lat,lng],{icon:trIco}).addTo(window._trackMap).bindPopup('Your tradesman');
  if(window._trackJobCoords){
    const R=6371,jc=window._trackJobCoords;
    const dLat=(jc.lat-lat)*Math.PI/180,dLng=(jc.lng-lng)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(jc.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    const dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    const mins=Math.round(dist/0.5);
    const eta=document.getElementById('track-eta-'+(jobId||''));
    if(eta)eta.textContent=dist<0.1?'✓ Tradesman has arrived!':`~${mins} min away (${dist<1?(dist*1000).toFixed(0)+'m':(dist).toFixed(1)+'km'})`;
    window._trackMap.fitBounds([[lat,lng],[jc.lat,jc.lng]],{padding:[24,24]});
  }
}
